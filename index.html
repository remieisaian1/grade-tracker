<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Degree Grade Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f2; --surface: #ffffff; --surface2: #f0f0ed;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.2);
    --text: #1a1a18; --text2: #6b6b68; --text3: #a0a09c;
    --green: #27500a; --green-bg: #eaf3de;
    --blue: #0c447c; --blue-bg: #e6f1fb;
    --amber: #854f0b; --amber-bg: #faeeda;
    --red: #a32d2d; --red-bg: #fcebeb;
    --radius: 12px; --radius-sm: 7px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #161614; --surface: #222220; --surface2: #2a2a27;
      --border: rgba(255,255,255,0.09); --border2: rgba(255,255,255,0.18);
      --text: #f0f0ec; --text2: #9a9a96; --text3: #606060;
      --green: #c0dd97; --green-bg: #1a3408;
      --blue: #b5d4f4; --blue-bg: #062240;
      --amber: #fac775; --amber-bg: #3a2005;
      --red: #f7c1c1; --red-bg: #3d1212;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem 4rem; }
  .container { max-width: 700px; margin: 0 auto; }
  .top-bar { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.75rem; gap: 12px; }
  .top-bar-left h1 { font-size: 21px; font-weight: 700; letter-spacing: -0.3px; }
  .top-bar-left .subtitle { font-size: 13px; color: var(--text2); margin-top: 4px; }
  .save-bar { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .save-status { font-size: 11px; color: var(--text3); white-space: nowrap; }
  .save-status.saved { color: var(--green); }
  .save-status.saving { color: var(--amber); }
  .btn { background: transparent; border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 6px 14px; font-size: 12px; color: var(--text2); cursor: pointer; font-family: inherit; font-weight: 500; white-space: nowrap; }
  .btn:hover { background: var(--surface2); }
  .btn-danger { border-color: var(--red); color: var(--red); }
  .btn-danger:hover { background: var(--red-bg); }
  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .metric { background: var(--surface2); border-radius: var(--radius-sm); padding: 14px 16px; }
  .metric-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .metric-value { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
  .metric-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .cls-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-top: 7px; }
  .cls-first { background: var(--green-bg); color: var(--green); }
  .cls-21 { background: var(--blue-bg); color: var(--blue); }
  .cls-22 { background: var(--amber-bg); color: var(--amber); }
  .cls-third { background: var(--red-bg); color: var(--red); }
  .cls-tbd { background: var(--surface2); color: var(--text3); }
  .tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; }
  .tab { padding: 7px 18px; border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text2); font-family: inherit; font-weight: 500; }
  .tab.active { background: var(--surface); color: var(--text); border-color: var(--border2); }
  .year-panel { display: none; }
  .year-panel.active { display: block; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .module-name-input { font-size: 15px; font-weight: 700; color: var(--text); background: transparent; border: none; border-bottom: 1px solid transparent; padding: 2px 0; font-family: inherit; flex: 1; min-width: 0; }
  .module-name-input:focus { outline: none; border-bottom-color: var(--border2); }
  .module-grade { font-size: 14px; font-weight: 700; min-width: 54px; text-align: right; color: var(--text2); }
  .del-mod-btn { background: transparent; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 2px 8px; font-size: 11px; color: var(--text2); cursor: pointer; font-family: inherit; margin-left: 8px; }
  .del-mod-btn:hover { color: var(--red); border-color: var(--red); }
  .bar-wrap { height: 4px; background: var(--surface2); border-radius: 3px; margin-bottom: 14px; }
  .bar-fill { height: 4px; border-radius: 3px; transition: width 0.3s; }
  .col-headers { display: grid; grid-template-columns: 1fr 80px 80px 26px; gap: 8px; margin-bottom: 5px; }
  .col-hdr { font-size: 11px; color: var(--text3); text-align: center; }
  .col-hdr:first-child { text-align: left; }
  .comp-row { display: grid; grid-template-columns: 1fr 80px 80px 26px; gap: 8px; align-items: center; margin-bottom: 6px; }
  .comp-input { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 8px; font-size: 13px; color: var(--text); font-family: inherit; width: 100%; text-align: center; }
  .comp-input.name-input { text-align: left; }
  .comp-input:focus { outline: none; border-color: var(--border2); }
  .comp-input::placeholder { color: var(--text3); }
  .rm-btn { background: transparent; border: none; color: var(--text3); cursor: pointer; font-size: 17px; padding: 0; line-height: 1; font-family: inherit; }
  .rm-btn:hover { color: var(--red); }
  .weight-warn { font-size: 11px; color: var(--amber); margin: 5px 0 2px; min-height: 15px; }
  .add-comp-btn { background: transparent; border: 1px dashed var(--border2); border-radius: var(--radius-sm); padding: 5px 14px; font-size: 12px; color: var(--text2); cursor: pointer; font-family: inherit; margin-top: 6px; }
  .add-comp-btn:hover { background: var(--surface2); }
  .add-mod-btn { background: transparent; border: 1px dashed var(--border2); border-radius: var(--radius); padding: 10px; width: 100%; font-size: 13px; color: var(--text2); cursor: pointer; font-family: inherit; }
  .add-mod-btn:hover { background: var(--surface2); }
  .need-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .need-row:last-child { border-bottom: none; }
  .need-ok { color: var(--green); font-weight: 600; }
  .need-no { color: var(--red); }
  .need-num { color: var(--text2); }
  .formula-note { font-size: 11px; color: var(--text3); text-align: center; margin-top: 2rem; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--text); color: var(--bg); padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 500; opacity: 0; transition: all 0.25s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  @media (max-width: 480px) {
    .metrics { grid-template-columns: 1fr 1fr; }
    .metrics .metric:last-child { grid-column: span 2; }
    .col-headers, .comp-row { grid-template-columns: 1fr 60px 60px 22px; gap: 5px; }
    .top-bar { flex-direction: column; }
    .save-bar { width: 100%; justify-content: flex-end; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <div class="top-bar-left">
      <h1>Degree Grade Tracker</h1>
      <p class="subtitle">Add your modules and weighted assessments — grades calculate automatically</p>
    </div>
    <div class="save-bar">
      <span class="save-status" id="save-status">auto-saved</span>
      <button class="btn btn-danger" onclick="clearData()">clear all</button>
    </div>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-label">Year 2 avg</div>
      <div class="metric-value" id="y2avg">—</div>
      <div class="metric-sub">weight: 25%</div>
    </div>
    <div class="metric">
      <div class="metric-label">Year 3 avg</div>
      <div class="metric-value" id="y3avg">—</div>
      <div class="metric-sub">weight: 75%</div>
    </div>
    <div class="metric">
      <div class="metric-label">Final grade</div>
      <div class="metric-value" id="final">—</div>
      <div id="cls-badge" class="cls-badge cls-tbd">add grades</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('y2')">Year 2</button>
    <button class="tab" onclick="switchTab('y3')">Year 3</button>
    <button class="tab" onclick="switchTab('targets')">Targets</button>
  </div>

  <div id="tab-y2" class="year-panel active"></div>
  <div id="tab-y3" class="year-panel"></div>
  <div id="tab-targets" class="year-panel">
    <div class="card"><div id="targets-content"></div></div>
  </div>

  <p class="formula-note">Final = (Year 2 avg × 25%) + (Year 3 avg × 75%) · Kingston University weighting</p>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'degree-tracker-v1';
let nid = 1;
const newComp = () => ({ id: nid++, name: "", weight: "", grade: "" });
const newModule = n => ({ id: nid++, name: n, components: [newComp()] });

const defaultData = () => ({
  y2: { modules: [newModule("Module 1")] },
  y3: { modules: [newModule("Module 1"), newModule("Module 2"), newModule("Module 3"), newModule("Module 4")] }
});

function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return defaultData();
    const parsed = JSON.parse(saved);
    // restore nid to avoid collisions
    const allIds = [...parsed.y2.modules, ...parsed.y3.modules]
      .flatMap(m => [m.id, ...m.components.map(c => c.id)]);
    nid = Math.max(...allIds) + 1;
    return parsed;
  } catch(e) {
    return defaultData();
  }
}

let saveTimer = null;
function saveData() {
  const statusEl = document.getElementById('save-status');
  statusEl.textContent = 'saving…';
  statusEl.className = 'save-status saving';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      statusEl.textContent = 'auto-saved';
      statusEl.className = 'save-status saved';
    } catch(e) {
      statusEl.textContent = 'save failed';
      statusEl.className = 'save-status';
    }
  }, 600);
}

function clearData() {
  if (!confirm('Clear all your saved grades? This cannot be undone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  nid = 1;
  Object.assign(data, defaultData());
  render();
  showToast('All data cleared');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

let data = loadData();

function switchTab(t) {
  document.querySelectorAll('.tab').forEach((b, i) => b.classList.toggle('active', ['y2','y3','targets'][i] === t));
  document.querySelectorAll('.year-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');
}

const calcModuleGrade = m => {
  const v = m.components.filter(c => c.grade !== "" && c.weight !== "" && +c.weight > 0 && !isNaN(+c.grade));
  if (!v.length) return null;
  const tw = v.reduce((s, c) => s + +c.weight, 0);
  return v.reduce((s, c) => s + +c.grade * +c.weight, 0) / tw;
};

const calcYearAvg = yr => {
  const grades = data[yr].modules.map(calcModuleGrade).filter(g => g !== null);
  return grades.length ? grades.reduce((s, g) => s + g, 0) / grades.length : null;
};

const barColor = g => g >= 70 ? "#27500a" : g >= 60 ? "#0c447c" : g >= 50 ? "#854f0b" : "#a32d2d";
const classify = g => g >= 70 ? { label: "First class", cls: "cls-first" }
  : g >= 60 ? { label: "2:1", cls: "cls-21" }
  : g >= 50 ? { label: "2:2", cls: "cls-22" }
  : { label: "Third / below", cls: "cls-third" };

function recalculate() {
  const y2 = calcYearAvg('y2'), y3 = calcYearAvg('y3');
  document.getElementById('y2avg').textContent = y2 !== null ? y2.toFixed(1) + "%" : "—";
  document.getElementById('y3avg').textContent = y3 !== null ? y3.toFixed(1) + "%" : "—";
  if (y2 !== null && y3 !== null) {
    const f = y2 * 0.25 + y3 * 0.75;
    document.getElementById('final').textContent = f.toFixed(1) + "%";
    const { label, cls } = classify(f);
    Object.assign(document.getElementById('cls-badge'), { textContent: label, className: "cls-badge " + cls });
  } else {
    document.getElementById('final').textContent = "—";
    Object.assign(document.getElementById('cls-badge'), { textContent: "add grades", className: "cls-badge cls-tbd" });
  }
  renderTargets();
}

function renderTargets() {
  const y2 = calcYearAvg('y2'), cont = document.getElementById('targets-content');
  if (y2 === null) { cont.innerHTML = '<p style="font-size:13px;color:var(--text2)">Add Year 2 grades first.</p>'; return; }
  cont.innerHTML = [{ label: "First class (70%+)", t: 70 }, { label: "2:1 (60%+)", t: 60 }, { label: "2:2 (50%+)", t: 50 }]
    .map(th => {
      const n = (th.t - y2 * 0.25) / 0.75;
      const [txt, cls] = n <= 0 ? ["already secured", "need-ok"] : n > 100 ? ["not achievable", "need-no"] : ["need " + n.toFixed(1) + "% avg in Year 3", "need-num"];
      return '<div class="need-row"><span style="font-weight:600">' + th.label + '</span><span class="' + cls + '">' + txt + '</span></div>';
    }).join('');
}

const esc = s => String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');

function renderYear(yr) {
  const panel = document.getElementById('tab-' + yr);
  panel.innerHTML = data[yr].modules.map(m => {
    const g = calcModuleGrade(m);
    const totalW = m.components.reduce((s, c) => s + (+c.weight || 0), 0);
    const warn = totalW > 0 && Math.abs(totalW - 100) > 0.5 ? "weights total " + totalW.toFixed(0) + "% — should add up to 100%" : "";
    return '<div class="card">' +
      '<div class="card-header">' +
        '<input class="module-name-input" value="' + esc(m.name) + '" placeholder="Module name" data-yr="' + yr + '" data-mid="' + m.id + '" data-field="mname" />' +
        '<div style="display:flex;align-items:center;gap:6px">' +
          '<span class="module-grade" id="badge-' + yr + '-' + m.id + '">' + (g !== null ? g.toFixed(1) + "%" : "—") + '</span>' +
          '<button class="del-mod-btn" data-yr="' + yr + '" data-mid="' + m.id + '" data-action="delmod">remove</button>' +
        '</div>' +
      '</div>' +
      '<div class="bar-wrap"><div class="bar-fill" id="bar-' + yr + '-' + m.id + '" style="width:' + (g !== null ? Math.min(g,100) : 0) + '%;background:' + (g !== null ? barColor(g) : 'transparent') + '"></div></div>' +
      '<div class="col-headers"><div class="col-hdr">assessment</div><div class="col-hdr">weight %</div><div class="col-hdr">grade %</div><div></div></div>' +
      m.components.map(c =>
        '<div class="comp-row">' +
          '<input class="comp-input name-input" placeholder="e.g. Exam 1" value="' + esc(c.name) + '" data-yr="' + yr + '" data-mid="' + m.id + '" data-cid="' + c.id + '" data-field="name" />' +
          '<input class="comp-input" type="number" min="0" max="100" placeholder="40" value="' + esc(c.weight) + '" data-yr="' + yr + '" data-mid="' + m.id + '" data-cid="' + c.id + '" data-field="weight" />' +
          '<input class="comp-input" type="number" min="0" max="100" placeholder="72" value="' + esc(c.grade) + '" data-yr="' + yr + '" data-mid="' + m.id + '" data-cid="' + c.id + '" data-field="grade" />' +
          '<button class="rm-btn" data-yr="' + yr + '" data-mid="' + m.id + '" data-cid="' + c.id + '" data-action="delcomp">×</button>' +
        '</div>'
      ).join('') +
      '<div class="weight-warn" id="warn-' + yr + '-' + m.id + '">' + warn + '</div>' +
      '<button class="add-comp-btn" data-yr="' + yr + '" data-mid="' + m.id + '" data-action="addcomp">+ add assessment</button>' +
    '</div>';
  }).join('') + '<button class="add-mod-btn" data-yr="' + yr + '" data-action="addmod">+ add module</button>';
}

function refreshModuleBadge(yr, mid) {
  const m = data[yr].modules.find(x => x.id === mid);
  if (!m) return;
  const g = calcModuleGrade(m);
  const badge = document.getElementById("badge-" + yr + "-" + mid);
  const bar = document.getElementById("bar-" + yr + "-" + mid);
  const warn = document.getElementById("warn-" + yr + "-" + mid);
  if (badge) badge.textContent = g !== null ? g.toFixed(1) + "%" : "—";
  if (bar) { bar.style.width = (g !== null ? Math.min(g,100) : 0) + "%"; bar.style.background = g !== null ? barColor(g) : "transparent"; }
  if (warn) {
    const tw = m.components.reduce((s, c) => s + (+c.weight || 0), 0);
    warn.textContent = tw > 0 && Math.abs(tw - 100) > 0.5 ? "weights total " + tw.toFixed(0) + "% — should add up to 100%" : "";
  }
}

function render() { renderYear('y2'); renderYear('y3'); recalculate(); }

document.body.addEventListener('input', e => {
  const el = e.target, yr = el.dataset.yr, mid = +el.dataset.mid, cid = +el.dataset.cid, field = el.dataset.field;
  if (!yr || !field) return;
  const m = data[yr].modules.find(x => x.id === mid);
  if (!m) return;
  if (field === 'mname') { m.name = el.value; }
  else { const c = m.components.find(x => x.id === cid); if (c) c[field] = el.value; }
  refreshModuleBadge(yr, mid);
  recalculate();
  saveData();
});

document.body.addEventListener('click', e => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const yr = el.dataset.yr, mid = +el.dataset.mid, cid = +el.dataset.cid, action = el.dataset.action;
  if (action === 'addmod') { data[yr].modules.push(newModule("Module " + (data[yr].modules.length + 1))); render(); saveData(); }
  else if (action === 'addcomp') { const m = data[yr].modules.find(x => x.id === mid); if (m) { m.components.push(newComp()); render(); saveData(); } }
  else if (action === 'delmod') { if (data[yr].modules.length > 1) { data[yr].modules = data[yr].modules.filter(x => x.id !== mid); render(); saveData(); } }
  else if (action === 'delcomp') { const m = data[yr].modules.find(x => x.id === mid); if (m && m.components.length > 1) { m.components = m.components.filter(x => x.id !== cid); render(); saveData(); } }
});

render();
</script>
</body>
</html>
